  /partner/registrations/v1/search:
    get:
      tags:
        - Registration Search
      summary: Search registrations for a partner account
      description: |
        **Search Registrations**.

         Searches deal and service registrations for a given partner account, with
         support for filtering by status, program type, registration identifiers,
         date ranges, and sorting with cursor-based pagination. Returns both draft
         and submitted registrations unless further filtered by status.
      operationId: searchRegistrations
      parameters:
        - name: X-Partner-Account-Id
          in: header
          required: true
          description: >
            Unique identifier of the partner account whose registrations are
            being searched. The caller must have permission to act on this
            partner.
          schema:
            type: string
        - name: status
          in: query
          required: false
          style: form
          explode: false
          description: >
            Optional comma-separated list of registration statuses to filter by.
            If omitted, results include registrations of all statuses visible to
            the partner.

            Possible values include: `DRAFT`, `USE_CHILD_REGISTRATIONS`,
            `SUBMITTED`, `APPROVED`, `REJECTED`, `CLOSED_WON`, `CLOSED_LOST`,
            `CLOSED`, `RETURNED`, `FIELD_APPROVED`, `ON_HOLD`, `EXPIRED`,
            `PENDING`, `UNDER_REVIEW`.
          schema:
            type: array
            items:
              type: string
        - name: registrationId
          in: query
          required: false
          description: >
            Filter by specific registration ID (for example, `D-xxxx` or
            `CD-xxxx`).
          schema:
            type: string
        - name: parentRegistrationId
          in: query
          required: false
          description: >
            Filter by parent registration ID to retrieve child registrations
            (for example, `D-xxxx`).
          schema:
            type: string
        - name: programType
          in: query
          required: false
          style: form
          explode: false
          description: |
            Optional comma-separated list of program types to filter by.
            Supported values: * `DEAL_REGISTRATION` * `SERVICE_REGISTRATION`
          schema:
            type: array
            items:
              type: string
              enum:
                - DEAL_REGISTRATION
                - SERVICE_REGISTRATION
        - name: registrationType
          in: query
          required: false
          description: >
            Filter by registration hierarchy type.

            * `PARENT` – top-level registrations. * `CHILD` – registrations that
            have a parentRegistrationId.
          schema:
            type: string
            enum:
              - PARENT
              - CHILD
        - name: createdAfter
          in: query
          required: false
          description: >
            Start of creation time window (inclusive), in ISO 8601 date-time
            format (for example, `2024-01-01T00:00:00Z`).
          schema:
            type: string
            format: date-time
        - name: createdBefore
          in: query
          required: false
          description: >
            End of creation time window (inclusive), in ISO 8601 date-time
            format (for example, `2024-12-31T23:59:59Z`).
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          description: >
            Maximum number of registrations to return in a single page (page
            size). Default is 10; maximum is 100.
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 10
        - name: pageToken
          in: query
          required: false
          description: >
            Opaque pagination token returned by a previous search response. Use
            this to fetch the next page of results.
          schema:
            type: string
        - name: sortBy
          in: query
          required: false
          description: >
            Field to sort results by. Defaults to `CREATED_AT` when omitted.

            Supported values: * `CREATED_AT` * `LAST_MODIFIED_AT` *
            `REGISTRATION_ID` * `STATUS` * `PROGRAM_TYPE`
          schema:
            type: string
            enum:
              - CREATED_AT
              - LAST_MODIFIED_AT
              - REGISTRATION_ID
              - STATUS
              - PROGRAM_TYPE
        - name: sortOrder
          in: query
          required: false
          description: >
            Sort direction for the specified sort field. Defaults to `DESC`
            (newest first).
          schema:
            type: string
            enum:
              - ASC
              - DESC
            default: DESC
      responses:
        '200':
          description: Search results returned successfully.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchRegistrationsResponse'
        '401':
          description: Missing or invalid authentication token.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: Caller does not have permission for the specified partner account.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '500':
          description: Internal server error while performing the search.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /partner/registrations/v1/deals/{registrationId}/extensions:
    post:
      tags:
