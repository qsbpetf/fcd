          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '500':
          description: Internal server error while creating the extension request.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /partner/partner-accounts/v1/list:
    get:
      tags:
