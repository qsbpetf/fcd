openapi: 3.0.1
info:
  title: Partner Registration APIs
  description: >
    APIs for creating, updating, submitting, searching, and tracking partner
    deal and service registrations, as well as listing partner accounts and
    requesting extensions.
  version: '1.0'
security:
  - ASAP: []
tags:
  - name: Service Registrations
    description: >
      Manage **service registrations** for partner-led service engagements,
      including draft creation, updates, retrieval, and submission.
  - name: Deal Registrations
    description: >
      Manage **deal registrations** for partner-led sales opportunities,
      including draft creation, updates, retrieval, and submission.
  - name: Async Submission Requests
    description: >
      Perform **asynchronous registration submissions** and track submission
      jobs until completion, failure, or validation error.
  - name: Registration Search
    description: >
      **Search and list registrations** (deal and service) with rich filtering,
      sorting, and pagination for a given partner account.
  - name: Registration Extensions
    description: >
      **Request extensions** for eligible deal registrations by proposing a new
      closure date and providing justification.
  - name: Partner Accounts
    description: >
      **Discover partner accounts** that the current caller can act on,
      including roles and primary account designation.
paths:
  /partner/registrations/v1/services:
    post:
      tags:
        - Service Registrations
      summary: Create a new draft service registration
      description: >
        **Create Service Registration Draft**. Creates a new **draft** service
        registration for an existing partner account. The draft can later be
        updated and submitted asynchronously for processing. This API supports
        only existing customers and existing customer contacts; it does **not**
        create new customer or contact records.
      operationId: createDraftRegistration
      parameters:
        - name: X-Partner-Account-Id
          in: header
          required: true
          description: >
            Unique identifier of the partner account on whose behalf the
            registration is being created. The caller must have permission to
            act on this partner.
          schema:
            type: string
      requestBody:
        description: >-
          Payload containing details of the service registration to create as a
          draft.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRegistrationPayload'
        required: true
      responses:
        '201':
          description: Draft service registration created successfully.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DraftCreationSuccess'
        '400':
          description: Invalid request parameters or payload; see ApiResponse for details.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Missing or invalid authentication token.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: Caller does not have permission for the specified partner account.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '409':
          description: >-
            Conflict while creating the registration (for example, a conflicting
            existing registration).
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '422':
          description: Validation failed; one or more fields are invalid or missing.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '500':
          description: Internal server error while creating the draft registration.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
