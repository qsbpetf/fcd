  /partner/registrations/v1/deals/{registrationId}/submit:
    post:
      tags:
        - Async Submission Requests
        - Deal Registrations
      summary: Submit a deal registration asynchronously
      description: >
        **Submit Deal Registration (Async)**.

        Queues a deal registration for asynchronous submission. This operation:

        * Performs basic synchronous validations (auth, existence, partner
        visibility). * Persists an `async_submission_request` job with status
        `IN_PROGRESS`. * Enqueues the job for background processing. * Returns
        immediately with a `jobId` and `IN_PROGRESS` status.

        The client must poll the job status endpoint to track progress until the
        job reaches a terminal state (`COMPLETED`, `FAILED`,
        `VALIDATION_ERROR`).
      operationId: submitDealRegistrationAsync
      parameters:
        - name: X-Partner-Account-Id
          in: header
          required: true
          description: >
            Unique identifier of the partner account used to enforce visibility
            and access control for the registration being submitted.
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: false
          description: >
            Optional idempotency key used to avoid creating duplicate async jobs
            when the client retries the same submission request.
          schema:
            type: string
        - name: registrationId
          in: path
          required: true
          description: The registration ID of the deal registration to submit.
          schema:
            type: string
      requestBody:
        description: This endpoint does not accept a request body.
        required: false
        content: {}
      responses:
        '202':
          description: Submission queued for asynchronous processing.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatusSuccess'
        '400':
          description: >-
            Invalid request (for example, malformed registrationId or failed
            pre-submission validation).
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Missing or invalid authentication token.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: >-
            Caller does not have permission for the specified partner account or
            registration.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: >-
            Registration does not exist or is not visible to the partner
            account.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '409':
          description: >-
            Registration is already submitted or in a state that cannot be
            resubmitted.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '422':
          description: >-
            Validation failed; the registration cannot be submitted in its
            current state.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '500':
          description: Internal server error while queuing the submission.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /partner/registrations/v1/services/{registrationId}/submit:
    post:
      tags:
        - Async Submission Requests
        - Service Registrations
      summary: Submit a service registration asynchronously
      description: >
        Business capability: **Submit Service Registration (Async)**.

        Queues a service registration for asynchronous submission. This
        operation:

        * Performs basic synchronous validations (auth, existence, partner
        visibility). * Persists an `async_submission_request` job with status
        `IN_PROGRESS`. * Enqueues the job for background processing. * Returns
        immediately with a `jobId` and `IN_PROGRESS` status.

        The client must poll the job status endpoint to track progress until the
        job reaches a terminal state (`COMPLETED`, `FAILED`,
        `VALIDATION_ERROR`).
      operationId: submitServiceRegistrationAsync
      parameters:
        - name: X-Partner-Account-Id
          in: header
          required: true
          description: >
            Unique identifier of the partner account used to enforce visibility
            and access control for the registration being submitted.
          schema:
            type: string
        - name: Idempotency-Key
          in: header
          required: false
          description: >
            Optional idempotency key used to avoid creating duplicate async jobs
            when the client retries the same submission request.
          schema:
            type: string
        - name: registrationId
          in: path
          required: true
          description: The registration ID of the service registration to submit.
          schema:
            type: string
      requestBody:
        description: This endpoint does not accept a request body.
        required: false
        content: {}
      responses:
        '202':
          description: Submission queued for asynchronous processing.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobStatusSuccess'
        '400':
          description: >-
            Invalid request (for example, malformed registrationId or failed
            pre-submission validation).
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '401':
          description: Missing or invalid authentication token.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '403':
          description: >-
            Caller does not have permission for the specified partner account or
            registration.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '404':
          description: >-
            Registration does not exist or is not visible to the partner
            account.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '409':
          description: >-
            Registration is already submitted or in a state that cannot be
            resubmitted.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '422':
          description: >-
            Validation failed; the registration cannot be submitted in its
            current state.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
        '500':
          description: Internal server error while queuing the submission.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
