    patch:
      tags:
        - Service Registrations
      summary: Update an existing service registration
      description: >
        Business capability: **Update Service Registration**. Partially updates
        fields on an existing service registration (draft or submitted,
        depending on business rules). Only fields included in the request body
        are updated.

        Business rules: * Draft registrations: all fields are editable. *
        Submitted registrations: only certain fields are editable (depends on
        approval status). * Approved / expired registrations: immutable and
        cannot be updated.
