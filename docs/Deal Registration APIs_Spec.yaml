          required: true
          description: >
            Unique identifier of the partner account used to enforce visibility
            and access control for the requested registration.
          schema:
            type: string
        - name: registrationId
          in: path
          required: true
          description: >
            Unique registration identifier of the service registration to
            retrieve (for example, `D-xxxx` or `CD-xxxx`).
          schema:
            type: string
      responses:
        '200':
          description: Service registration retrieved successfully.
          headers:
            X-Trace-Id:
              description: >-
                A unique identifier assigned to each request that can be used to
                trace a specific request.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceRegistrationView'
