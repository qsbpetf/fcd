components:
  schemas:
    Address:
      type: object
      description: Postal address details associated with a company or contact.
      properties:
        city:
          type: string
          description: City name for the address.
        country:
          type: string
          description: Country or region for the address, typically in full name form.
        postalCode:
          type: string
          description: Postal or ZIP code for the address.
        state:
          type: string
          description: State, province, or region for the address.
        street:
          type: string
          description: Street address, including house or building number.
    Company:
      type: object
      description: >
        Customer or partner company entity, including identity, domain, and
        billing details.
      properties:
        id:
          type: string
          description: Unique identifier of the company in the underlying system.
        name:
          type: string
          description: Display name of the company.
        domain:
          type: string
          description: >-
            Primary email or web domain associated with the company (for
            example, `example.com`).
        industry:
          type: string
          description: >-
            Industry classification of the company (for example, Software,
            Financial Services).
        website:
          type: string
          description: Public website URL of the company.
        region:
          type: string
          description: >-
            High-level geographic region associated with the company (for
            example, APAC, AMER, EMEA).
        billingAddress:
          $ref: '#/components/schemas/Address'
          description: Billing address information for the company.
    Contact:
      type: object
      description: >
        Person record associated with one or more accounts, including roles,
        product access, and engagement metrics.
      properties:
        id:
          type: string
          description: Unique identifier of the contact in the underlying system.
        aaid:
          type: string
          description: Atlassian account identifier (AAID) for this contact.
        firstName:
          type: string
          description: Given name of the contact.
        lastName:
          type: string
          description: Family name or surname of the contact.
        phone:
          type: string
          description: Primary phone number for the contact.
        accountId:
          type: string
          description: Primary account identifier associated with the contact.
        email:
          type: string
          description: Primary email address for the contact.
        roles:
          uniqueItems: true
          type: array
          description: Distinct roles assigned to the contact across accounts or products.
          items:
            type: string
            description: Role name assigned to the contact.
        avatarUrl:
          type: string
          description: URL for the contact's profile or avatar image.
        title:
          type: string
          description: Job title of the contact.
        department:
          type: string
          description: Department or functional group the contact belongs to.
        location:
          type: string
          description: City or office location where the contact is based.
        country:
          type: string
          description: Country where the contact is located.
        timezone:
          type: string
          description: >-
            Time zone string for the contact (for example, `UTC`,
            `America/Los_Angeles`).
        startDate:
          type: string
          description: >
            Date when the contact first engaged with Atlassian or the partner,
            in ISO 8601 date format.
        contactStartDate:
          type: string
          description: >
            Date when the contact record was first created or activated, in ISO
            8601 date format.
        accountStartDate:
          type: string
          description: >
            Date when the contact's associated account was first created or
            activated, in ISO 8601 date format.
        assignedApps:
          uniqueItems: true
          type: array
          description: >-
            Distinct applications that have been successfully provisioned for
            the contact.
          items:
            type: string
            description: Application key or identifier assigned to the contact.
        failedApps:
          uniqueItems: true
          type: array
          description: Applications that failed during provisioning for the contact.
          items:
            type: string
            description: Application key or identifier that failed to be provisioned.
        pendingApps:
          uniqueItems: true
          type: array
          description: Applications that are pending provisioning for the contact.
          items:
            type: string
            description: Application key or identifier pending provisioning.
        accreditations:
          type: array
          description: >-
            List of partner or program accreditations associated with the
            contact.
          items:
            type: string
            description: Accreditation code or label.
        certifications:
          type: array
          description: List of product or role-based certifications held by the contact.
          items:
            type: string
            description: Certification code or label.
        kudos:
          type: integer
          format: int32
          description: Count of kudos or recognition points awarded to the contact.
        tickets:
          type: integer
          format: int32
          description: Number of support tickets associated with the contact.
        isActive:
          type: boolean
          description: Indicates whether the contact is currently active.
        userStats:
          type: object
          description: >
            Key–value map of user-specific statistics (for example, usage
            counts, engagement metrics), where values are integer counters.
          additionalProperties:
            type: integer
            format: int32
        primaryAccountId:
          type: string
          description: Identifier of the primary account associated with the contact.
        secondaryAccountIds:
          uniqueItems: true
          type: array
          description: Distinct secondary account identifiers linked to the contact.
          items:
            type: string
            description: Secondary account identifier.
        accountToRolesMap:
          type: object
          description: >
            Mapping from account identifiers to the distinct roles the contact
            holds for each account.
          additionalProperties:
            uniqueItems: true
            type: array
            items:
              type: string
              description: Role name assigned to the contact for the given account.
        provisioningStatus:
          type: string
          description: Overall provisioning status for the contact across systems.
        lastModified:
          type: string
          description: >-
            Timestamp when the contact record was last updated, in ISO 8601
            format.
        requestId:
          type: string
          description: >
            Correlation identifier of the request that last modified this
            contact, useful for audit and debugging.
        oldRegistrationAppEnabled:
          type: boolean
          description: >
            Indicates whether the legacy registration application is enabled for
            this contact.
        isOldRegistrationAppEnabled:
          type: boolean
          description: >
            Convenience flag indicating whether the old registration app is
            currently enabled.
    CustomerContactDto:
      type: object
      description: Lightweight representation of a customer contact for registration flows.
      properties:
        id:
          type: string
          description: Unique identifier of the customer contact.
        aaid:
          type: string
          description: Atlassian account identifier (AAID) for the contact, if available.
        firstName:
          type: string
          description: Given name of the customer contact.
        lastName:
          type: string
          description: Family name or surname of the customer contact.
        email:
          type: string
          description: Email address of the customer contact.
        country:
          type: string
          description: Country where the customer contact is located.
        jobTitle:
          type: string
          description: Job title or role of the customer contact.
        mobile:
          type: string
          description: Mobile phone number of the customer contact.
        phone:
          type: string
          description: Landline or alternate phone number of the customer contact.
    DraftRegistrationError:
      type: object
      description: >
        Error entry describing a specific issue encountered while creating or
        updating a draft registration.
      properties:
        statusCode:
          type: string
          description: >-
            Error status code associated with this draft error (typically an
            internal or HTTP-like code).
        message:
          type: string
          description: Human-readable description of the error.
        fields:
          type: array
          description: List of field names associated with this error.
          items:
            type: string
            description: Field path or name that failed validation.
    DraftRegistrationResponse:
      type: object
      description: >
        Response model summarizing the outcome of a draft registration
        operation, including success flag and any field-level errors.
      properties:
        id:
          type: string
          description: Unique identifier of the draft registration.
        registrationNumber:
          type: string
