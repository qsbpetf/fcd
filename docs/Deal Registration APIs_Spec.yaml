          in: header
          required: true
          description: >
            Unique identifier of the partner account used to enforce visibility
            and access control for the registration being updated.
          schema:
            type: string
        - name: registrationId
          in: path
          required: true
          description: >-
            Unique registration identifier of the service registration to
            update.
          schema:
            type: string
      requestBody:
        description: >
          Partial payload containing only the service registration fields to
          update. Fields omitted from the request remain unchanged.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ServiceRegistrationPayload'
        required: true
