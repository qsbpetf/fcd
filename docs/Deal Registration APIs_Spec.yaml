      summary: Request an extension for a deal registration
      description: >
        **Request Registration Extension**.

        Submits an extension request for an eligible deal registration by
        proposing a new closure date and providing extension notes. Extension
        requests are processed according to program-specific approval rules.
      operationId: requestDealRegistrationExtension
      parameters:
