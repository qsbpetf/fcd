      summary: List partner accounts accessible to the caller
      description: >
        **List Partner Accounts**.

        Returns the list of partner accounts that the authenticated caller can
        act on, including the account name, roles, and primary account
        indicator. This is typically used by clients to populate a partner
        account selector before calling registration APIs with
        `X-Partner-Account-Id`.
      operationId: listMyPartnerAccounts
      parameters:
