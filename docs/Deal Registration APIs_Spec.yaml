            description: Atlassian product associated with this registration.
            enum:
              - ATLAS
              - ATLASSIAN_ACCESS
              - ATLASSIAN_GUARD
              - BAMBOO
              - BEACON
              - BITBUCKET
              - COMPASS
              - CONFLUENCE
              - CROWD
              - CRUCIBLE
              - FISHEYE
              - JIRA
              - JIRA_ALIGN
              - JIRA_PRODUCT_DISCOVERY
              - JIRA_SERVICE_MANAGEMENT
              - JIRA_SERVICE_MANAGEMENT_200_OR_LESS_USERS
              - JIRA_SERVICE_MANAGEMENT_201_OR_MORE_USERS
              - JIRA_SERVICE_MANAGEMENT_500_OR_LESS_USERS
              - JIRA_SERVICE_MANAGEMENT_501_OR_MORE_USERS
              - JIRA_SOFTWARE
              - JIRA_SOFTWARE_MANAGEMENT
              - JIRA_WORK_MANAGEMENT
              - JIRA_WORK_MANAGEMENT_EXPANSION_ONLY
              - LOOM
              - LOOM_NEW_ONLY
              - OPSGENIE
              - ROVO
              - SOURCETREE
              - STATUSPAGE
              - STRATEGY_COLLECTION
              - TEAMWORK_COLLECTION
              - TRELLO
              - CUSTOMER_MANAGED_KEYS_CMK
              - ROVO_DEV
              - SERVICE_COLLECTION
              - SERVICE_COLLECTION_200_OR_LESS_USERS
              - SERVICE_COLLECTION_201_OR_MORE_USERS
        customerHasCloudSite:
          type: string
          description: >
            Indicates whether the customer already has an existing Atlassian
            cloud site associated with this registration.
        cloudSite:
          type: string
          description: URL or unique identifier of the customer's Atlassian cloud site.
        notes:
          type: string
          description: >-
            Free-form notes about the registration, visible to Atlassian and
            partner users.
        termsAccepted:
          type: boolean
          description: >
            Indicates whether the partner has accepted the program terms and
            conditions for this registration.
        sowConfirmed:
          type: boolean
          description: >
            Indicates whether the Statement of Work (SOW) has been confirmed
            between the partner and the customer.
        termsConfirmed:
          type: boolean
          description: >
            Indicates whether all additional terms or agreements for this
            registration have been confirmed.
        detailedDescription:
          type: string
          description: >
            Detailed narrative describing the deal opportunity, scope, and
            context.
        platform:
          type: string
          description: >
            Target deployment platform for the opportunity (for example, Cloud,
            Data Center, or both).
          enum:
            - CLOUD
            - DATA_CENTER
            - BOTH
        estimatedRevenue:
          type: number
          format: double
          description: Estimated total revenue amount for the deal opportunity.
        customerContactEmailId:
          type: string
          description: >
            Email address of the primary customer contact for this registration.
            Must reference an existing, linked customer contact.
        customerDomain:
          type: string
          description: >
            Domain name of the customer organization (for example,
            `customer.com`). Must reference an existing, linked customer.
        partnerSalesRepresentativeEmailId:
          type: string
          description: >
            Email address of the partner sales representative owning this
            registration. Must reference an existing, linked partner contact.
        status:
          type: string
          description: >-
            Current lifecycle status of the deal registration (for example,
            DRAFT, SUBMITTED, APPROVED).
        estimatedOpportunityCloseDate:
          type: string
          format: date
          description: >
            Estimated date when the opportunity is expected to close, in
            `yyyy-MM-dd` format.
        expirationDate:
          type: string
          format: date
          description: >
            Date when the registration expires or is no longer eligible, in
            `yyyy-MM-dd` format.
        submissionDate:
          type: string
          format: date
          description: >
            Date when the registration was originally submitted, in `yyyy-MM-dd`
            format.
        approvalDate:
          type: string
          format: date
          description: |
            Date when the registration was approved, in `yyyy-MM-dd` format.
        createdAt:
          type: string
          format: date-time
          description: >-
            Timestamp when the registration was created, in ISO 8601 date-time
            format.
        lastModifiedAt:
          type: string
          format: date-time
          description: >-
            Timestamp when the registration was last updated, in ISO 8601
            date-time format.
        denialReason:
          type: string
          description: Reason for denial when the registration has been rejected.
        comments:
          type: string
          description: >-
            Additional internal or external comments related to the
            registration.
        dealRegDcExceptionReason:
          type: string
          description: >
            Reason for requesting an exception related to Data Center in the
            context of this deal registration.
        budgetAllocated:
          type: string
          description: >
            Indicates whether budget has been approved and allocated for this
            deal.
          enum:
            - 'YES'
            - 'NO'
            - UNKNOWN
        customerKeyDecisionMakersEngagedInProcess:
          type: boolean
          description: >
            Indicates whether key decision makers on the customer side are
            actively engaged in the sales process.
        crucialEvent:
          type: string
          description: >
            Critical milestone, event, or deadline (for example, contract
            renewal, go-live date) that drives the deal timeline.
        rfpRelated:
          type: boolean
          description: >-
            Indicates whether this deal is associated with a formal RFP or
            tender.
        rfpRelatedTo:
          type: string
          description: >
            Specifies the kind of RFP or tender associated with this deal, when
            `rfpRelated` is true.
          enum:
            - ATLASSIAN_SPECIFIED_PRODUCT_PROPOSAL
            - GENERAL_SOLUTION_PROPOSAL
            - GOVERNMENT_TENDER
        salesType:
          type: string
          description: >
            Sales motion classification for this deal (for example, new,
            renewal, or platform change).
          enum:
            - NEW
            - UPGRADE
            - RENEWAL
            - NEW_PRODUCT
            - EXPANSION_UPGRADE
            - PLATFORM_CHANGE_WITH_EXPANSION_UPGRADE
            - PLATFORM_CHANGE_WITHOUT_EXPANSION_UPGRADE
        senOrEntitlementNumber:
          type: string
          description: >
            Support Entitlement Number (SEN) or other entitlement identifier
            associated with this opportunity.
        additionalInfo:
          type: string
          description: Additional free-form information or context about the deal.
        eccListedAboveIsKeyDecisionMaker:
          type: boolean
          description: >
            Indicates whether the primary end-customer contact (ECC) already
            referenced above is also the key decision maker.
        eccKeyDecisionMaker:
          $ref: '#/components/schemas/EccKeyDecisionMaker'
          description: >
            Details of the end-customer key decision maker when different from
            the primary customer contact.
    AsyncJobErrorDetail:
      type: object
      description: Detailed field-level issue within an async job error.
      properties:
        field:
          type: string
          description: Name or path of the field that failed validation.
        issue:
          type: string
          description: >-
            Machine-readable code describing the validation issue (for example,
            `BELOW_THRESHOLD`).
        message:
          type: string
          description: Human-readable explanation of the validation issue.
    AsyncJobError:
      type: object
      description: Error information returned for a failed or validation-error async job.
      properties:
        code:
          type: string
          description: >-
            Machine-readable error code (for example, `VALIDATION_ERROR`,
            `SUBMISSION_TIMEOUT`).
        message:
          type: string
          description: Human-readable error message describing the failure.
        details:
          type: array
          description: Optional list of field-level validation details.
          items:
            $ref: '#/components/schemas/AsyncJobErrorDetail'
    JobStatusSuccess:
      type: object
      description: Response representing the status of an async job.
      properties:
        jobId:
          type: string
          description: Unique identifier of the async submission job.
        status:
          type: string
          description: >
            Current status of the async job. Typical values include:
            `IN_PROGRESS`, `COMPLETED`, `FAILED`, `VALIDATION_ERROR`.
        createdAt:
          type: string
          format: date-time
          description: >-
            Timestamp when the async job was created, in ISO 8601 date-time
            format.
        lastModifiedAt:
          type: string
          format: date-time
          description: >-
            Timestamp when the async job was last updated, in ISO 8601 date-time
            format.
        registrationId:
          type: string
          description: >-
            Unique identifier of the registration whose submission is being
            processed.
        error:
          $ref: '#/components/schemas/AsyncJobError'
          nullable: true
          description: >
            Error details when the job is in `FAILED` or `VALIDATION_ERROR`
            status; null for `IN_PROGRESS` or `COMPLETED`.
    ExtensionRequestPayload:
      type: object
      description: Payload for requesting an extension on a deal registration.
      properties:
        proposedClosureDate:
          type: string
          format: date
          description: >
            Proposed new closure date for the registration, in `yyyy-MM-dd`
            format.
        extensionNotes:
          type: string
          description: >
            Free-form notes explaining why an extension is required and any
            additional context.
    ExtensionRequestResponse:
      type: object
      description: Response returned when an extension request is submitted.
      properties:
        registrationId:
          type: string
          description: Identifier of the registration for which extension was requested.
        status:
          type: string
          description: >
            Current status of the registration after the extension request
            (typically `SUBMITTED` while the extension is under review).
        message:
          type: string
          description: Human-readable confirmation message for the extension request.
    RegistrationSearchResult:
      type: object
      description: >
        Lightweight registration record returned by the search API, combining
        common deal and service registration fields.
      properties:
        id:
          type: string
          description: >-
            Unique identifier of the registration (for example, `D-xxxx` or
            `CD-xxxx`).
        parentRegistrationId:
          type: string
          description: >-
            Identifier of the parent registration if this is a child
            registration.
        dealName:
          type: string
          description: Name of the deal or service engagement.
        programType:
          type: string
          description: >-
            Program type of the registration (for example, `DEAL_REGISTRATION`,
            `SERVICE_REGISTRATION`).
        status:
          type: string
          description: Current lifecycle status of the registration.
        customerContactEmailId:
          type: string
          description: Email address of the primary customer contact.
        customerDomain:
          type: string
          description: Domain name of the customer organization.
        partnerSalesRepresentativeEmailId:
          type: string
          description: Email address of the partner sales representative.
        partnerSubmittedOpportunityNumber:
          type: string
          description: Partner-submitted opportunity identifier.
        opportunityNumber:
          type: string
          description: >-
            Internal or external opportunity number associated with this
            registration.
        estimatedRevenue:
          type: string
          description: Estimated revenue value for the registration, formatted as a string.
        extensionStatus:
          type: string
          description: >
            Current status of any extension request associated with the
            registration.
        expirationDate:
          type: string
          format: date
          description: |
            Current expiration date of the registration, in `yyyy-MM-dd` format.
        submissionDate:
          type: string
          format: date
          description: >
            Date when the registration was originally submitted, in `yyyy-MM-dd`
            format.
        approvalDate:
          type: string
          format: date
          description: |
            Date when the registration was approved, in `yyyy-MM-dd` format.
        createdAt:
          type: string
          format: date-time
          description: >-
            Timestamp when the registration was created, in ISO 8601 date-time
            format.
        lastModifiedAt:
          type: string
          format: date-time
          description: >-
            Timestamp when the registration was last updated, in ISO 8601
            date-time format.
    PaginationLinks:
      type: object
      description: Hypermedia links for navigating paginated search results.
      properties:
        self:
          type: string
          description: URL of the current page of search results.
        next:
          type: string
          description: URL of the next page of search results, if available.
    Pagination:
      type: object
      description: Pagination metadata for registration search results.
      properties:
        pageSize:
          type: integer
          format: int32
          description: Number of results requested per page.
        nextPageToken:
          type: string
          description: >
            Opaque token to be used as `pageToken` to fetch the next page of
            results.
        hasNext:
          type: boolean
          description: Indicates whether there is a next page of results.
        hasPrevious:
          type: boolean
          description: Indicates whether there is a previous page of results.
        links:
          $ref: '#/components/schemas/PaginationLinks'
          description: Hypermedia navigation links for the current and next pages.
    SearchRegistrationsResponse:
      type: object
      description: Response envelope for registration search results.
      properties:
        registrations:
          type: array
          description: List of registration search results matching the query.
          items:
            $ref: '#/components/schemas/RegistrationSearchResult'
        pagination:
          $ref: '#/components/schemas/Pagination'
          description: Pagination metadata and navigation links for the result set.
    PartnerAccount:
      type: object
      description: >
        Partner account that the caller can act on, including roles and primary
        flag.
      properties:
        partnerId:
          type: string
          description: Unique identifier of the partner account.
        accountName:
          type: string
          description: Display name of the partner account.
        roles:
          type: array
          description: Roles that the caller holds on this partner account.
          items:
            type: string
            description: Role name assigned to the caller (for example, `ADMIN`, `SELLER`).
        isPrimary:
          type: boolean
          description: Indicates whether this is the caller's primary partner account.
    PartnerAccountsResponse:
      type: object
      description: Response containing partner accounts accessible to the caller.
      properties:
        partnerAccounts:
          type: array
          description: List of partner accounts that the caller can act on.
          items:
            $ref: '#/components/schemas/PartnerAccount'
