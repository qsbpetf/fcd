<template>
    <lightning-spinner if:true={isLoading} alternative-text="Loading" size="medium"></lightning-spinner>

    <lightning-card title="Import MEDDPICC into Salesforce Opportunity" icon-name="custom:custom14">
        <div class="slds-grid slds-gutters slds-grid_vertical-align-end meddpic-input-row">
            <div class="slds-col slds-size_12-of-12 slds-large-size_4-of-12">
                <lightning-file-upload
                        label="Upload JSON file from MEDDPICC"
                        name="fileUploader"
                        accept={acceptedFormats}
                        record-id={recordId}
                        onuploadfinished={handleUploadFinished}>
                </lightning-file-upload>
            </div>
            <div class="slds-col slds-size_12-of-12 slds-large-size_4-of-12">
                <lightning-textarea
                    label="Or paste MEDDPICC JSON"
                    value={jsonTextFromTextarea}
                    onchange={handleJsonInputChange}
                    placeholder="Paste MEDDPICC JSON here...">
                </lightning-textarea>
            </div>
            <div class="slds-col slds-size_12-of-12 slds-large-size_4-of-12 slds-text-align_right">
                <lightning-button disabled={buttonsDisabled} label="Import MEDDPICC" variant="brand" onclick={handleImport}></lightning-button>
            </div>
        </div>
    </lightning-card>
</template>
