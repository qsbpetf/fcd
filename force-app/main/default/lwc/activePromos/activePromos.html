<template>
    <lightning-card title="Active Promo Codes" icon-name="standard:discounts">
        <div class="slds-m-around_small">
            <template if:true={hasPromoCodes}>
                <lightning-datatable
                        key-field="Id"
                        data={promoCodes}
                        columns={columns}
                        hide-checkbox-column>
                </lightning-datatable>
            </template>
            <template if:false={hasPromoCodes}>
                <div class="slds-text-align_center slds-m-vertical_medium">
                    <p class="slds-text-color_weak">No active promo codes found.</p>
                </div>
            </template>
            <template if:true={error}>
                <div class="slds-text-color_error slds-m-vertical_medium">
                    {error.body.message}
                </div>
            </template>
        </div>
    </lightning-card>
</template>
