<template>
    <lightning-card title="Active Products" icon-name="standard:product">

        <!-- Loading Spinner -->
        <template if:true={isLoading}>
            <div class="slds-is-relative slds-p-around_large">
                <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Error Message -->
        <template if:true={error}>
            <div class="slds-p-around_medium">
                <div class="slds-text-color_error">
                    <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
                    &nbsp; An error occurred while loading products. Please try again.
                </div>
            </div>
        </template>

        <!-- Data Table -->
        <template if:true={hasProducts}>
            <div class="slds-p-around_medium">
                <div class="slds-m-bottom_small slds-text-body_small slds-text-color_weak">
                    Showing {productCount} active product(s)
                </div>
                <lightning-datatable
                    key-field="id"
                    data={products}
                    columns={columns}
                    hide-checkbox-column
                    show-row-number-column
                    default-sort-direction="desc"
                    sorted-by="License_end_date__c"
                    sorted-direction="desc"
                    onsort={handleSort}
                >
                </lightning-datatable>
            </div>
        </template>

        <!-- Empty State -->
        <template if:false={hasProducts}>
            <template if:false={isLoading}>
                <template if:false={error}>
                    <div class="slds-p-around_large slds-text-align_center">
                        <div class="slds-illustration slds-illustration_small">
                            <div class="slds-text-longform">
                                <h3 class="slds-text-heading_medium">No Active Products</h3>
                                <p class="slds-text-body_regular slds-text-color_weak">
                                    This account has no products in "Order" stage opportunities.
                                </p>
                            </div>
                        </div>
                    </div>
                </template>
            </template>
        </template>

    </lightning-card>
</template>
