<template>
    <lightning-card title="Deal &amp; Service Registration" icon-name="standard:record">
        <div class="slds-p-around_medium">
            <div class="slds-m-bottom_medium registration-type-select">
                <lightning-combobox
                    label="Registration Type"
                    value={selectedRegistrationType}
                    options={registrationTypeOptions}
                    onchange={handleRegistrationTypeChange}
                    required
                ></lightning-combobox>
            </div>

            <template if:true={showFormContent}>
                <div class="form-divider"></div>
            </template>

            <template if:true={showDealForm}>
                <c-atlassian-deal-reg-draft-form
                    title="Create Deal Draft"
                ></c-atlassian-deal-reg-draft-form>
            </template>

            <template if:true={showServicePlaceholder}>
                <div class="slds-box slds-theme_shade slds-p-around_large slds-text-align_center">
                    <lightning-icon icon-name="standard:service_appointment" size="large" class="slds-m-bottom_small"></lightning-icon>
                    <h3 class="slds-text-heading_medium slds-m-bottom_x-small">Create Service Draft</h3>
                    <p class="slds-text-color_weak">Service registration draft creation is coming soon.</p>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
