<template>
    <template if:true={showSyncButton}>
        <lightning-button
            label="Create in Atlassian"
            title="Creates the remote draft from saved data. Then use Submit."
            variant="brand"
            onclick={handleSync}
            disabled={isSyncing}
        ></lightning-button>
    </template>
    <template if:true={showSubmitButton}>
        <lightning-button
            label="Submit"
            variant="brand"
            onclick={handleSubmit}
            disabled={isSubmitting}
        ></lightning-button>
    </template>
    <template if:true={showRefreshButton}>
        <lightning-button
            label="Refresh"
            variant="neutral"
            onclick={handleRefresh}
            disabled={isRefreshing}
        ></lightning-button>
    </template>
</template>
